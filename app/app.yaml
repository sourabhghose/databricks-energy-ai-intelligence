command:
  - python
  - -m
  - uvicorn
  - main:app
  - --host
  - 0.0.0.0
  - --port
  - "8000"
  - --workers
  - "1"

env:
  - name: DATABRICKS_CATALOG
    value: energy_copilot_catalog
  - name: LAKEBASE_DATABASE
    value: energy_copilot
  - name: LAKEBASE_USER
    value: energy_copilot_app
  - name: LAKEBASE_HOST
    value: "instance-79b76ee4-4780-44f2-bfc0-5194dd163dd6.database.cloud.databricks.com"
  - name: LAKEBASE_INSTANCE_NAME
    value: "energy-copilot-db"
  - name: LAKEBASE_PORT
    value: "443"
  - name: LOG_LEVEL
    value: INFO
  - name: PYTHONPATH
    value: /app
